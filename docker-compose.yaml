services:
  # Kontener bazy danych MySQL
  db:
    image: mysql:8.0
    container_name: mysql_mieszkania
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: projekt_mieszkania
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    volumes:
      - db_data:/var/lib/mysql
    # Healthcheck: aplikacja ruszy dopiero, gdy baza realnie przyjmuje połączenia
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  # Kontener aplikacji Spring Boot
  app:
    build: .
    container_name: spring_mieszkania
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Nadpisanie adresu bazy: zamiast localhost aplikacja uderza do kontenera "db"
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/projekt_mieszkania?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ''

volumes:
  db_data:
